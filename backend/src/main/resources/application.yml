server:
  port: 8080

spring:
  application:
    name: my-maplestory-api

  datasource:
    url: jdbc:mysql://localhost:3306/mymaplestory?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 개발 초기엔 update, 안정화 후 validate로 전환 권장
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

# 넥슨 오픈 API 설정 - 실제 키는 환경변수(NEXON_API_KEY)로 주입하세요.
# 절대 이 파일에 키를 직접 커밋하지 마세요.
nexon:
  api:
    base-url: https://open.api.nexon.com/maplestory/v1
    key: ${NEXON_API_KEY:}

logging:
  level:
    com.mymaplestory: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
